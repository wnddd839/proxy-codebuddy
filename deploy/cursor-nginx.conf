server {
    listen 32124 default_server;
    listen [::]:32124 default_server;
    server_name _;
    client_max_body_size 50m;

    location = / {
        return 302 /direct-admin/;
    }

    location = /admin {
        return 301 /direct-admin/;
    }

    location = /admin/ {
        return 301 /direct-admin/;
    }

    location = /admin-preview {
        return 301 /direct-admin/;
    }

    location = /admin-preview/ {
        return 301 /direct-admin/;
    }

    location = /direct-admin {
        return 301 /direct-admin/;
    }

    location = /direct-admin-preview {
        return 301 /direct-admin/;
    }

    location = /direct-admin-preview/ {
        return 301 /direct-admin/;
    }

    location ^~ /direct-admin/ {
        proxy_pass http://127.0.0.1:32126;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /v1/ {
        proxy_pass http://127.0.0.1:32126;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:32126/health;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
